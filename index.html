<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>🔥 Habit Tracker</h1>

  <!-- ➕ Ajouter habitude -->
  <div class="card add">
    <input id="habitInput" placeholder="Nouvelle habitude...">
    <button onclick="addHabit()">Ajouter</button>
  </div>

  <!-- 📊 Stats -->
  <div class="card stats">
    <p id="stats">0/0 aujourd’hui</p>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>
  </div>

  <!-- 📋 Liste -->
  <div id="habitList"></div>

  <!-- 📈 Dashboard -->
  <div class="card dashboard">
    <h3>📊 Dashboard</h3>
    <p id="dashboard">Aucune donnée</p>
  </div>

  <!-- 💰 PRO -->
  <div class="card premium">
    <h3>🚀 Passe en PRO</h3>
    <p>Habitudes illimitées + stats avancées</p>

    <a href="https://buy.stripe.com/test_fZu7sN2TF15zgiO4LmaMU00" target="_blank">
      <button class="pro-btn">Devenir PRO</button>
    </a>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
