<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Habit App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <h1>Habits</h1>
      <p id="quote"></p>
    </div>

    <!-- ADD -->
    <div class="add">
      <input id="habitInput" placeholder="Nouvelle habitude">
      <button onclick="addHabit()">+</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <p id="stats"></p>

      <div class="progress-bar">
        <div id="progress"></div>
      </div>
    </div>

    <!-- LIST -->
    <div id="habitList"></div>

    <!-- DASHBOARD -->
    <div class="dashboard">
      <p id="dashboard"></p>
    </div>

    <!-- PRO -->
    <div class="premium">
      <p>🚀 Passe PRO</p>

      <a href="https://buy.stripe.com/test_fZu7sN2TF15zgiO4LmaMU00">
        <button class="pro-btn">Upgrade</button>
      </a>
    </div>

  </div>

</div>

<!-- PAYWALL -->
<div id="paywall" class="paywall hidden">
  <div class="paywall-box">
    <h2>👑 PRO</h2>
    <p>Unlock everything</p>

    <a href="https://buy.stripe.com/test_fZu7sN2TF15zgiO4LmaMU00">
      <button>Upgrade</button>
    </a>

    <button onclick="closePaywall()">Close</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
