<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="container">

  <h1>Habit Tracker</h1>

  <!-- AUTH -->
  <div id="auth">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="signup()">Créer compte</button>
    <button onclick="login()">Connexion</button>
  </div>

  <!-- APP -->
  <div id="app" style="display:none;">

    <p id="proStatus"></p>

    <input id="habitInput" placeholder="Nouvelle habitude">
    <button onclick="addHabit()">Ajouter</button>

    <h3 id="stats"></h3>

    <div class="progress-bar">
      <div id="progress"></div>
    </div>

    <div id="habitList"></div>

    <h3>📊 Dashboard</h3>
    <p id="dashboard"></p>

    <!-- 💰 STRIPE -->
    <a href="https://buy.stripe.com/test_fZu7sN2TF15zgiO4LmaMU00" target="_blank">
      <button class="pro-btn">🚀 Passer en PRO</button>
    </a>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
