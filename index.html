<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <h1>🔥 Habit Tracker</h1>

  <!-- 🔐 LOGIN -->
  <div id="loginBox" class="card">
    <input id="username" placeholder="Ton nom">
    <button onclick="login()">Se connecter</button>
  </div>

  <!-- 📱 APP -->
  <div id="appContent" style="display:none;">

    <!-- ➕ Ajouter -->
    <div class="card add">
      <input id="habitInput" placeholder="Nouvelle habitude...">
      <button onclick="addHabit()">Ajouter</button>
    </div>

    <!-- 📊 Stats -->
    <div class="card stats">
      <p id="stats"></p>

      <div class="progress-bar">
        <div id="progress"></div>
      </div>
    </div>

    <!-- 📋 Liste -->
    <div id="habitList"></div>

    <!-- 📊 Dashboard -->
    <div class="card dashboard">
      <h3>📊 Dashboard</h3>
      <p id="dashboard"></p>
    </div>

    <!-- 💰 PRO -->
    <div class="card premium">
      <h3>🚀 Version PRO</h3>
      <p id="proText">🆓 Version gratuite</p>

      <a href="https://buy.stripe.com/test_fZu7sN2TF15zgiO4LmaMU00" target="_blank">
        <button class="pro-btn">Devenir PRO</button>
      </a>

      <!-- bouton test -->
      <button onclick="unlockPro()" class="test-btn">
        🔓 Activer PRO (test)
      </button>
    </div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
